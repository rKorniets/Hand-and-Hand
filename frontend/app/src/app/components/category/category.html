<div class="filters">

  @if (config.showSearch !== false) {
    <div class="filters__section">
      <input
        type="text"
        class="filters__input-search"
        placeholder="ПОШУК"
        [(ngModel)]="filters.search"
        (ngModelChange)="onSearchChange()"
      />
    </div>
  }

  @if (config.categoryContext) {
    <div class="filters__section">
      <h3 class="filters__title">Категорії</h3>
      @if (isLoading) {
        <p>Завантаження...</p>
      } @else {
        <div class="filters__group">
          @for (cat of categories; track cat.id) {
            <label class="filters__checkbox">
              <input
                type="checkbox"
                [checked]="isChecked(filters.categories, cat.slug)"
                (change)="toggleCategory(cat.slug)"
              />
              {{ cat.name }}
            </label>
          } @empty {
            <p>Категорій немає</p>
          }
        </div>
      }
    </div>
    <hr class="filters__divider" />
  }

  @if (config.showDateRange) {
    <div class="filters__section">
      <h3 class="filters__title">Дати</h3>
      <div class="filters__date-picker">
        <label>Від:</label>
        <input
          type="date"
          class="filters__input-date"
          [min]="today"
          [(ngModel)]="filters.dateFrom"
          (ngModelChange)="onDateChange()"
        />
      </div>
      <div class="filters__date-picker">
        <label>До:</label>
        <input
          type="date"
          class="filters__input-date"
          [min]="minDateTo"
          [(ngModel)]="filters.dateTo"
          (ngModelChange)="onDateChange()"
        />
      </div>
    </div>
    <hr class="filters__divider" />
  }

  @if (config.showCity) {
    <div class="filters__section">
      <h3 class="filters__title">Населений пункт</h3>
      <div class="filters__select-wrapper">
        <select
          class="filters__select"
          [(ngModel)]="filters.city"
          (ngModelChange)="onCityChange()"
        >
          <option value="">обрати</option>
          @for (city of cities; track city) {
            <option [value]="city">{{ city }}</option>
          }
        </select>
      </div>
    </div>
  }

</div>
