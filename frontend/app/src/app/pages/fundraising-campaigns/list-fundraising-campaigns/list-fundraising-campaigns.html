<section class="list__component">
  <div class="list__component__header">
    <h2 class="list__component__title">Приєднатися до збору</h2>
  </div>

  <div class="list__component__grid">
    <article class="fundraising__card" *ngFor="let i of [1,2,3,4,5]">
      <div class="fundraising__card__image">
      </div>

      <div class="fundraising__card__body">
        <h3 class="fundraising__card__title">Назва збору</h3>

        <p class="fundraising__card__description">
          Збір на ...
        </p>

        <div class="fundraising__card__organizer">
          <span class="fundraising__card__org-name">Організатор: ГО "Разом"</span>
        </div>
      </div>
    </article>
  </div>
</section>
