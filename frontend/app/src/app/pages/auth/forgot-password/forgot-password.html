<section class="forgot">
  <div class="forgot__container">
    <div class="forgot__title-wrapper">
      <h1 class="forgot__title">Скинути пароль</h1>
    </div>

    <div class="forgot__description">
      Введіть вашу електронну пошту. Ми надішлемо лист із посиланням для створення нового пароля.
    </div>

    @if (successMessage) {
      <div class="forgot__success">{{ successMessage }}</div>
    }

    @if (error) {
      <div class="forgot__error">{{ error }}</div>
    }

    <form class="forgot__form" (ngSubmit)="onSubmit()">
      <div class="forgot__field">
        <label class="forgot__label">Пошта:</label>
        <input
          class="forgot__input"
          type="email"
          placeholder="example@gmail.com"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <button type="submit" class="forgot__button" [disabled]="loading || successMessage">
        @if (loading) {
          Завантаження...
        } @else if (successMessage) {
          Перевірте пошту
        } @else {
          Надіслати лист
        }
      </button>
    </form>
  </div>
</section>
