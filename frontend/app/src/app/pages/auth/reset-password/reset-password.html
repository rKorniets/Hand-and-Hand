<section class="reset">
  <div class="reset__container">

    <div class="reset__title-wrapper">
      <h1 class="reset__title">Встановити пароль</h1>
    </div>

    <div class="reset__description">
      Встановіть новий пароль
    </div>

    <form class="reset__form" (ngSubmit)="onSubmit()">
      <div class="reset__field">
        <label class="reset__label">Пароль:</label>
        <input class="reset__input" type="password" placeholder="******"
               [(ngModel)]="password" name="password" required />
      </div>

      <button type="submit" class="reset__button" [disabled]="loading || !!successMessage">
        @if (loading) {
          Завантаження...
        } @else if (successMessage) {
          Увійти...
        } @else if (error) {
          Спробуйте ще раз
        } @else {
          Оновити пароль
        }
      </button>
    </form>
  </div>
</section>
