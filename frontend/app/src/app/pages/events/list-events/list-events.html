<section class="events-list">
  <div class="events-list__header">
    <h2 class="events-list__title">Волонтерські події</h2>
  </div>

  <div class="events-list__list">
    @for (event of events; track event.id) {
      <a class="events-list__item" [routerLink]="['/events', event.id]">
        <div class="events-list__image"></div>

        <div class="events-list__body">
          <div class="events-list__top">
            <h3 class="events-list__item-title">{{ event.title }}</h3>
            @if (event.starts_at) {
              <span class="events-list__date">{{ event.starts_at | date: 'dd.MM.yyyy' }}</span>
            }
          </div>
          @if (event.description) {
            <p class="events-list__text">{{ event.description }}</p>
          }
        </div>
      </a>
    } @empty {
      <p class="events-list__empty">Подій не знайдено.</p>
    }
  </div>
</section>
