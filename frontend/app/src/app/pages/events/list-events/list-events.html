<section class="list__component">
  <div class="list__component__header">
    <h2 class="list__component__title">Волонтерські події</h2>
  </div>

  <div class="list__component__grid">
    @for (event of events; track event.id) {
      <article class="event__card">
        <div class="event__card__image"></div>

        <div class="event__card__body">
          <div class="event__card__content">
            <h3 class="event__card__title">{{ event.title }}</h3>

            <div class="event__card__info">
              @if (event.starts_at) {
                <div class="event__card__info-item">
                  <span class="event__card__icon material-symbols-outlined">calendar_month</span>
                  <span>{{ event.starts_at | date: 'dd MMMM, HH:mm' }}</span>
                </div>
              }

              <div class="event__card__organizer">
                <span class="event__card__org-name">{{ event.description }}</span>
              </div>
            </div>
          </div>
        </div>
      </article>
    } @empty {
      <p class="list__empty-message">Подій не знайдено.</p>
    }
  </div>
</section>
