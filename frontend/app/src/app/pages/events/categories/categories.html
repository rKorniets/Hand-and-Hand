<aside class="filters">
  <section class="filters__section">
    <div class="filters__search">
      <input type="text" placeholder="пошук події" class="filters__input__search">
    </div>
    <div class="filters__group">
      <h3 class="filters__title">Категорії</h3>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>Екологія та довкілля</span>
      </label>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>Освіта та саморозвиток</span>
      </label>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>Допомога ЗСУ та ветеранам</span>
      </label>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>Соціальна допомога</span>
      </label>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>Культура та мистецтво</span>
      </label>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>Ментальне здоров'я</span>
      </label>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>Урбаністика та місто</span>
      </label>
    </div>
  </section>

  <hr class="filters__divider">

  <section class="filters__section">
    <h3 class="filters__title">Статус</h3>
    <div class="filters__group">
      <label class="filters__checkbox">
        <input type="checkbox"> <span>активні</span>
      </label>
      <label class="filters__checkbox">
        <input type="checkbox"> <span>завершені</span>
      </label>
    </div>
  </section>

  <hr class="filters__divider">

  <section class="filters__section">
    <h3 class="filters__title">Дати події</h3>

    <div class="filters__date-picker"> <label>Від:</label>
      <input
        type="date"
        [(ngModel)]="startDate"
        [max]="endDate"
        class="filters__input-date"> </div>

    <div class="filters__date-picker">
      <label>До:</label>
      <input
        type="date"
        [(ngModel)]="endDate"
        [min]="startDate"
        class="filters__input-date">
    </div>
  </section>

  <hr class="filters__divider">

  <section class="filters__section">
    <h3 class="filters__title">Населений пункт</h3>
    <div class="filters__select__wrapper">
      <input
        type="text"
        class="filters__select"
        list="city-options"
        placeholder="обрати"
      >
      <datalist id="city-options">
        <option value="онлайн">
        <option value="Львів">
        <option value="Київ">
        <option value="Ужгород">
        <option value="Славута">
      </datalist>
    </div>
  </section>
</aside>
