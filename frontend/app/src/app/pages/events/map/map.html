<section class="map__component">
  <div class="map__component__header">
    <h2 class="map__component__title">Мапа подій</h2>
  </div>

  <div class="map__component__body">
    <div class="map__component__canvas" id="map">
      <div class="map__placeholder">
        <span>Завантаження інтерактивної карти...</span>
      </div>
    </div>

    <div class="map__component__info">
      <div class="map__search">
        <input
          type="text"
          class="map__search__input"
          placeholder="пошук події"
        >
      </div>

      <div class="map__description">
        <p class="map__description__text">
          Знайдіть події поруч з вами та приєднуйтеся до них
        </p>
      </div>
    </div>
  </div>
</section>
