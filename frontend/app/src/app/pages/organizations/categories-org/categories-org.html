<aside class="categories__org">
  <section class="categories__org__section">
    <div class="categories__org__body">
      <input class="categories__org__search" type="text" placeholder="пошук організацій" />
    </div> </section>

  <section class="categories__org__section">
    <div class="categories__org__header">
      <h2 class="categories__org__title">Категорії</h2>
    </div>

    <div class="categories__org__list">
      @for (category of categories; track category) {
        <label class="categories__org__option">
          <input type="checkbox" />
          <span>{{ category }}</span>
        </label>
      }
    </div>
  </section> </aside>
