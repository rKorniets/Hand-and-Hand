<main class="organizations">
  <div class="organizations__wrapper">
    <aside class="organizations__sidebar">
      <app-filters [config]="filterConfig" (filtersChanged)="onFiltersChanged($event)" />
    </aside>

    <div class="organizations__main">
      @if (loading) {
        <p>Завантаження...</p>
      }
      @if (error) {
        <p>Помилка завантаження. Спробуйте пізніше.</p>
      }
      @if (!loading) {
        <app-list-org [organizations]="organizations" />
      }
    </div>
  </div>
</main>
