<div class="activity">
  <h2 #listTop class="activity__title">Волонтерська діяльність</h2>

  <button class="add-button" routerLink="/activity/create">+</button>

  <div class="activity__list">
    @for (item of visibleActivities; track item.id) {
      <div class="activity__item-wrapper">
        <a class="activity__item" [routerLink]="['/events', item.id]">
          <div class="activity__image"></div>
          <div class="activity__body">
            <div class="activity__top">
              <h3 class="activity__item-title">{{ item.title }}</h3>
              @if (item.starts_at) {
                <span class="activity__date">{{ item.starts_at | date: 'dd.MM.yyyy' }}</span>
              }
            </div>
            @if (item.description) {
              <p class="activity__text">{{ item.description }}</p>
            }
          </div>
        </a>

        @if (isOwner) {
          <a
            class="activity__edit-btn"
            [routerLink]="['/activity/edit', item.id]"
            title="Редагувати подію"
            aria-label="Редагувати подію"
          >
            <span class="material-symbols-outlined">draw</span>
          </a>
        }
      </div>
    }
  </div>

  @if (activities.length > 5) {
    <div class="activity__button">
      <button class="activity__more" (click)="toggleActivities(listTop)">
        {{ isExpanded ? 'Згорнути' : 'Переглянути більше' }}
      </button>
    </div>
  }
</div>
