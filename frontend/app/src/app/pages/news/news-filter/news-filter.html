<aside class="news-filter">

  <input class="news-filter__search" type="text" placeholder="пошук" />

  <div class="news-filter__header">
    <h2 class="news-filter__title">Категорії</h2>
  </div>

  <div class="news-filter__body">

    @for (category of categories; track category) {
      <label class="news-filter__option">
        <input type="checkbox" />
        <span>{{ category }}</span>
      </label>
    }
  </div>
</aside>
