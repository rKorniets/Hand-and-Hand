<section class="news-content">
  <div class="news-content__header">
    <h2 class="news-content__title">Новини</h2>
  </div>

  <div class="news-content__list">
    @for (item of items; track item.id) {
      <a class="news-content__item" [routerLink]="['/news', item.id]">
        @if (item.image_url) {
          <img
            class="news-content__image"
            [src]="item.image_url"
            [alt]="item.title"
            (error)="onImageError($event)"
          />
        }
        <div class="news-content__body">
          <div class="news-content__top">
            <h3 class="news-content__item-title">{{ item.title }}</h3>
            @if (item.created_at) {
              <span class="news-content__date">
                {{ item.created_at | date: 'dd.MM.yyyy' }}
              </span>
            }
          </div>
          @if (item.description) {
            <p class="news-content__text">{{ item.description }}</p>
          }
        </div>
      </a>
    } @empty {
      <div class="news-content__empty">
        <p>Список новин порожній або дані завантажуються...</p>
      </div>
    }
  </div>
</section>
